<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潜意识梦境人格测试</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=ZCOOL+XiaoWei&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a12;
            --surface: #12121e;
            --surface2: #1a1a2e;
            --border: rgba(255, 255, 255, 0.07);
            --text: #e8e4f0;
            --text-dim: rgba(232, 228, 240, 0.55);
            --text-dimmer: rgba(232, 228, 240, 0.25);
            --accent-c: #4a9eff;
            --accent-e: #ff6b8a;
            --accent-x: #4ade80;
            --accent-s: #c084fc;
            --gold: #d4a96a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Serif SC', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 15%, rgba(255, 255, 255, 0.45) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 60%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 30%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 80%, rgba(255, 255, 255, 0.25) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 20%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 82% 55%, rgba(255, 255, 255, 0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 92% 40%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 88%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 35% 10%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 63% 48%, rgba(255, 255, 255, 0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 78% 72%, rgba(255, 255, 255, 0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 5% 50%, rgba(255, 255, 255, 0.25) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 47% 65%, rgba(200, 180, 255, 0.45) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 88% 12%, rgba(180, 220, 255, 0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 22% 42%, rgba(255, 200, 220, 0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 58% 25%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 3% 75%, rgba(255, 255, 255, 0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 95% 85%, rgba(255, 255, 255, 0.25) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 65% 45% at 15% 25%, rgba(100, 50, 200, 0.09) 0%, transparent 70%),
                radial-gradient(ellipse 55% 65% at 85% 75%, rgba(20, 70, 180, 0.07) 0%, transparent 70%),
                radial-gradient(ellipse 45% 55% at 50% 50%, rgba(70, 15, 110, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .screen {
            display: none;
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }

        .screen.active {
            display: flex;
        }

        /* ── INTRO ── */
        #screen-intro {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            text-align: center;
        }

        .intro-eyebrow {
            font-size: 10px;
            letter-spacing: 7px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.75;
            margin-bottom: 28px;
            animation: fadeUp 0.8s ease both;
        }

        .intro-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(34px, 7.5vw, 68px);
            font-weight: 400;
            line-height: 1.2;
            background: linear-gradient(140deg, #e8e4f0 0%, #c084fc 50%, #4a9eff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 22px;
            animation: fadeUp 0.8s 0.1s ease both;
        }

        .intro-sub {
            font-size: 15px;
            color: var(--text-dim);
            line-height: 1.9;
            max-width: 420px;
            margin: 0 auto 48px;
            animation: fadeUp 0.8s 0.2s ease both;
        }

        .intro-copy {
            max-width: 480px;
            margin: 0 auto 52px;
            animation: fadeUp 0.8s 0.3s ease both;
        }

        .intro-copy p {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 2.1;
            margin-bottom: 14px;
            font-style: italic;
        }

        .intro-tags {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 48px;
            animation: fadeUp 0.8s 0.35s ease both;
        }

        .tag {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-dimmer);
            letter-spacing: 2px;
        }

        .btn-start {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 52px;
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.12), rgba(74, 158, 255, 0.12));
            border: 1px solid rgba(192, 132, 252, 0.32);
            border-radius: 40px;
            color: var(--text);
            font-family: 'Noto Serif SC', serif;
            font-size: 15px;
            letter-spacing: 5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.8s 0.4s ease both;
        }

        .btn-start::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.18), rgba(74, 158, 255, 0.18));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-start:hover::before {
            opacity: 1;
        }

        .btn-start:hover {
            border-color: rgba(192, 132, 252, 0.6);
            transform: translateY(-2px);
        }

        .intro-note {
            margin-top: 28px;
            font-size: 11px;
            color: var(--text-dimmer);
            letter-spacing: 2px;
            animation: fadeUp 0.8s 0.5s ease both;
        }

        /* ── QUIZ ── */
        #screen-quiz {
            flex-direction: column;
            align-items: center;
            padding: 40px 24px 80px;
        }

        .quiz-header {
            width: 100%;
            max-width: 680px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 36px;
        }

        .quiz-logo {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 14px;
            color: var(--gold);
            opacity: 0.65;
            letter-spacing: 2px;
        }

        .quiz-counter {
            font-size: 11px;
            color: var(--text-dimmer);
            letter-spacing: 3px;
        }

        .progress-bar {
            width: 100%;
            max-width: 680px;
            height: 2px;
            background: var(--border);
            border-radius: 2px;
            margin-bottom: 52px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c084fc, #4a9eff);
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        .question-card {
            width: 100%;
            max-width: 680px;
            animation: fadeUp 0.4s ease both;
        }

        .question-scene {
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.55;
            margin-bottom: 16px;
        }

        .question-text {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(19px, 3.8vw, 28px);
            font-weight: 400;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 40px;
        }

        .options-grid {
            display: grid;
            gap: 11px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 22px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.25s;
            width: 100%;
            color: var(--text);
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            line-height: 1.65;
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.25s;
        }

        .option-btn[data-dim="C"]::before {
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.1), transparent);
        }

        .option-btn[data-dim="E"]::before {
            background: linear-gradient(135deg, rgba(255, 107, 138, 0.1), transparent);
        }

        .option-btn[data-dim="X"]::before {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.1), transparent);
        }

        .option-btn[data-dim="S"]::before {
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.1), transparent);
        }

        .option-btn:hover::before {
            opacity: 1;
        }

        .option-btn:hover {
            border-color: rgba(255, 255, 255, 0.14);
            transform: translateX(4px);
        }

        .option-btn.selected {
            border-color: rgba(192, 132, 252, 0.5);
        }

        .option-btn.selected::before {
            opacity: 1;
        }

        .option-letter {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--text-dimmer);
            flex-shrink: 0;
            transition: all 0.25s;
            font-family: 'Noto Serif SC', serif;
        }

        .option-btn[data-dim="C"] .option-letter {
            border-color: rgba(74, 158, 255, 0.25);
        }

        .option-btn[data-dim="E"] .option-letter {
            border-color: rgba(255, 107, 138, 0.25);
        }

        .option-btn[data-dim="X"] .option-letter {
            border-color: rgba(74, 222, 128, 0.25);
        }

        .option-btn[data-dim="S"] .option-letter {
            border-color: rgba(192, 132, 252, 0.25);
        }

        .option-btn:hover .option-letter,
        .option-btn.selected .option-letter {
            background: rgba(192, 132, 252, 0.12);
            color: var(--text);
        }

        /* ── RESULT ── */
        #screen-result {
            flex-direction: column;
            align-items: center;
            padding: 60px 24px 80px;
        }

        .result-eyebrow {
            font-size: 10px;
            letter-spacing: 7px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.7;
            margin-bottom: 36px;
            animation: fadeUp 0.6s ease both;
        }

        .orb-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 36px;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        .orb {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            animation: orbFloat 5s ease-in-out infinite;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-10px) scale(1.025);
            }
        }

        .color-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 9px 20px;
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 28px;
            letter-spacing: 3px;
            animation: fadeUp 0.6s 0.2s ease both;
        }

        .color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .result-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(26px, 5.5vw, 46px);
            font-weight: 400;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #e8e4f0, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeUp 0.6s 0.25s ease both;
        }

        .result-subtitle {
            font-size: 12px;
            color: var(--text-dimmer);
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 52px;
            animation: fadeUp 0.6s 0.3s ease both;
        }

        .result-body {
            width: 100%;
            max-width: 680px;
        }

        .radar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 48px;
            animation: fadeUp 0.6s 0.35s ease both;
        }

        .section-label {
            font-size: 9px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.55;
            margin-bottom: 24px;
        }

        canvas#radar {
            max-width: 300px;
            width: 100%;
        }

        .dims-section {
            margin-bottom: 48px;
            animation: fadeUp 0.6s 0.4s ease both;
        }

        .dim-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 15px;
        }

        .dim-label {
            width: 80px;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .dim-bar-track {
            flex: 1;
            height: 5px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
        }

        .dim-bar-fill {
            height: 100%;
            border-radius: 3px;
            width: 0;
            transition: width 1.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dim-score {
            width: 36px;
            text-align: right;
            font-size: 12px;
            color: var(--text-dim);
        }

        .report-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 36px;
            animation: fadeUp 0.6s 0.45s ease both;
        }

        .report-opening {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 2.1;
            font-style: italic;
            margin-bottom: 0;
        }

        .report-paragraph {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 2.1;
            margin-bottom: 0;
        }

        .report-italic {
            font-style: italic;
            opacity: 0.75;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            opacity: 0.2;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--text);
        }

        .divider span {
            font-size: 9px;
            letter-spacing: 3px;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 36px;
            border: 1px solid var(--border);
            border-radius: 40px;
            background: transparent;
            color: var(--text-dim);
            font-family: 'Noto Serif SC', serif;
            font-size: 12px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.25s;
            animation: fadeUp 0.6s 0.5s ease both;
        }

        .btn-retry:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text);
            transform: translateY(-1px);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width:480px) {
            .report-section {
                padding: 22px 16px;
            }

            .option-btn {
                padding: 14px 14px;
                font-size: 13px;
                gap: 12px;
            }

            .option-letter {
                width: 24px;
                height: 24px;
                font-size: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- INTRO -->
    <section id="screen-intro" class="screen active">
        <div class="intro-eyebrow">Dream Narrative Personality Model</div>
        <h1 class="intro-title">潜意识梦境<br>人格测试</h1>
        <p class="intro-sub">你的梦境选择，正在暴露你的潜意识结构。</p>

        <div class="intro-copy">
            <p>在无数个夜晚里，大脑会做一件非常奇妙的事。<br>当现实世界安静下来，潜意识开始构建属于你的梦境。</p>
            <p>那里没有规则，却充满线索。<br>而你在梦境中的每一次选择，<br>都在悄悄透露你感知世界的方式。</p>
        </div>

        <div class="intro-tags">
            <span class="tag">25 个梦境场景</span>
            <span class="tag">4 个潜意识维度</span>
            <span class="tag">约 5 分钟</span>
        </div>

        <button class="btn-start" onclick="startQuiz()">
            <span>进入梦境</span>
            <span style="opacity:0.4">→</span>
        </button>
        <p class="intro-note">请跟随直觉作答，无需过多思考</p>
    </section>

    <!-- QUIZ -->
    <section id="screen-quiz" class="screen">
        <div class="quiz-header">
            <div class="quiz-logo">梦境测试</div>
            <div class="quiz-counter" id="counter">1 / 25</div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="question-card" id="question-card">
            <div class="question-scene">梦境场景</div>
            <div class="question-text" id="question-text"></div>
            <div class="options-grid" id="options-grid"></div>
        </div>
    </section>

    <!-- RESULT -->
    <section id="screen-result" class="screen">
        <div class="result-eyebrow">你的梦境人格</div>

        <div class="orb-container">
            <div class="orb" id="result-orb"></div>
        </div>

        <div class="color-badge">
            <div class="color-dot" id="color-dot"></div>
            <span id="color-name"></span>
        </div>

        <h2 class="result-title" id="result-title"></h2>
        <p class="result-subtitle" id="result-subtitle"></p>

        <div class="result-body">
            <div class="radar-section">
                <div class="section-label">四维度分析</div>
                <canvas id="radar" width="300" height="300"></canvas>
            </div>

            <div class="dims-section" id="dims-section"></div>
            <div class="report-section" id="report-section"></div>

            <div style="text-align:center;">
                <button class="btn-retry" onclick="resetQuiz()">↺ &nbsp;重新测试</button>
            </div>
        </div>
    </section>

    <script>
        // ─────────────────────────────────────────
        //  QUESTIONS  (enriched scene descriptions)
        // ─────────────────────────────────────────
        const questions = [
            {
                scene: "第一幕 · 森林入口",
                q: "夜里你走进一片陌生的森林。树木高耸，枝叶相互交叠，远处隐约传来流水声。你站在林缘，四周安静得只剩呼吸声。",
                opts: [
                    { t: "沿着脚下唯一一条可见的小径走下去", d: "C" },
                    { t: "先站着感受一下，感知这里的气息", d: "E" },
                    { t: "不管路不路，直接往深处走进去", d: "X" },
                    { t: "注意到树干上有奇怪的纹路，停下来观察", d: "S" }]
            },

            {
                scene: "第二幕 · 变色天空",
                q: "你抬起头，发现天空正在缓缓变成深紫色，没有任何预兆。云层像被染过一样，光线也变得奇异起来。",
                opts: [
                    { t: "试图推断是什么原因造成的", d: "C" },
                    { t: "胸口涌起一种说不清楚的情绪", d: "E" },
                    { t: "想知道天空的另一边究竟是什么", d: "X" },
                    { t: "直觉上觉得这颜色在提示某件事", d: "S" }]
            },

            {
                scene: "第三幕 · 锁着的门",
                q: "走廊尽头有一扇门，门缝透出微弱的光。你上前，发现门把手是锁住的，门上刻着一个你认不出的符号。",
                opts: [
                    { t: "检查门锁，想办法把它打开", d: "C" },
                    { t: "把耳朵贴上去，感受门后的动静", d: "E" },
                    { t: "找遍周围看有没有钥匙或别的入口", d: "X" },
                    { t: "盯着那个符号，感觉它在表达什么", d: "S" }]
            },

            {
                scene: "第四幕 · 陌生城市",
                q: "你站在一个完全陌生的城市街道上。建筑风格混乱，有些街道在半空交叉，行人都低着头走路，没有人对视。",
                opts: [
                    { t: "寻找路牌或地图，确认方位", d: "C" },
                    { t: "感受这座城市奇异的氛围", d: "E" },
                    { t: "随意选一个方向走，看看能到哪里", d: "X" },
                    { t: "注意到建筑物之间的排列有某种规律", d: "S" }]
            },

            {
                scene: "第五幕 · 陌生人",

        //  Box-Muller normal distribution, mapped to RGBA
        // ─────────────────────────────────────────
        function gaussianRand(mean, std) {
            let u = 0, v = 0;
            while (u === 0) u = Math.random();
            while (v === 0) v = Math.random();
            return mean + std * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);

        const dimSat = { C: 85, E: 80, X: 75, S: 80 };
        const dimLight = { C: 55, E: 58, X: 50, S: 55 };

        function scoresToDreamColor(fs) {
            // Weighted hue mixing with gaussian noise
            const total = fs.C + fs.E + fs.X + fs.S || 1;
            const wC = fs.C / total, wE = fs.E / total, wX = fs.X / total, wS = fs.S / total;

            // Circular hue average
            let sinSum = wC * Math.sin(dimHue.C * Math.PI / 180)
                + wE * Math.sin(dimHue.E * Math.PI / 180)
                + wX * Math.sin(dimHue.X * Math.PI / 180)
                + wS * Math.sin(dimHue.S * Math.PI / 180);
            let cosSum = wC * Math.cos(dimHue.C * Math.PI / 180)
                + wE * Math.cos(dimHue.E * Math.PI / 180)
                + wX * Math.cos(dimHue.X * Math.PI / 180)
                + wS * Math.cos(dimHue.S * Math.PI / 180);
            let hue = (Math.atan2(sinSum, cosSum) * 180 / Math.PI + 360) % 360;

            // Weighted saturation & lightness
            const sat = wC * dimSat.C + wE * dimSat.E + wX * dimSat.X + wS * dimSat.S;
            const light = wC * dimLight.C + wE * dimLight.E + wX * dimLight.X + wS * dimLight.S;

            // Add gaussian noise (std=8 for hue, std=4 for sat/light)
            hue = (hue + gaussianRand(0, 8) + 360) % 360;
            const finalSat = Math.min(100, Math.max(40, sat + gaussianRand(0, 4)));
            const finalLight = Math.min(75, Math.max(35, light + gaussianRand(0, 4)));

            const key2 = `${top2}_${top1}`;
            const base = closingTemplates[key1] || closingTemplates[key2] ||
                "梦境并不是预言，但它偶尔会像一面镜子，让我们看见一些平时不太注意到的自己。也许正因为这样，每个人的梦境，才会如此不同。";

            // Add a score-driven coda
            const maxScore = fs[top1];
            let coda = "";
            if (maxScore >= 72) {
                coda = `\n\n值得注意的是，你的「${dimLabels[top1]}」得分显著偏高。这意味着在大多数情境下，这一特质会成为你最本能的反应方式——几乎不需要思考，它已经在了。`;
            } else if (maxScore >= 52) {
                coda = `\n\n你的「${dimLabels[top1]}」与「${dimLabels[top2]}」得分较为接近，说明这两种特质在你身上并非主次分明，而是在不同情境下交替主导。这种灵活性本身就是一种能力。`;
            } else {
                coda = `\n\n你的四个维度分布相对均衡，没有特别极端的倾向。这意味着你的潜意识结构比较多元，不容易被单一模式定义——这是一种比较罕见的状态。`;
            }
            return base + coda;
        }

        // ─────────────────────────────────────────
        //  STATIC TEXT POOLS
        // ─────────────────────────────────────────
        const openings = [
            "在无数个夜晚里，大脑会做一件非常奇妙的事。\n\n当现实世界安静下来，潜意识开始构建属于你的梦境。那里没有规则，却充满线索。",
            "有些人做梦像是在旅行，有些人做梦像是在观察一场戏，还有些人，则像是在阅读一段隐藏的故事。\n\n梦境从来不是随机的，它只是换了一种语言，讲述你的内心。",
            "如果把人的意识比作一座城市，那么梦境就是城市最深处的灯光。\n\n那里不会说话，但它会用场景、颜色和情绪告诉你——你是谁。"
        ];
        const coreDescs = [
            "你的梦境像一条缓慢流动的河。\n\n很多人会匆匆经过世界，而你更像是停下来观察水面的人。你会注意那些别人不太在意的细节：一段气氛、一种变化、一点微妙的感觉。有时你甚至会突然意识到——原来世界还有另一种解释方式。",
            "你的梦境并不急着给出答案。\n\n它更像是一条不断延伸的道路。有些地方清晰，有些地方隐藏在雾里。而你似乎并不害怕这种未知，因为你知道很多有趣的事情，往往就藏在那些没有完全看清的地方。",
            "在梦境里，你更像一个观察世界的人。\n\n当别人只是走过一条路时，你会感受到：空气的变化，情绪的波动，场景背后的意味。很多时候，你并不是刻意在思考这些东西，它们只是自然地出现在你的感知里。"
        ];
        const atmospheres = [
            "你的梦境气质带着一点安静的神秘感。不是那种喧闹的奇幻，而是一种慢慢展开的画面。有时候是一片森林，有时候是一条没有尽头的小路，有时候只是某种无法解释的情绪。这些片段组合在一起，就像是一种属于你的语言。",
            "你的梦境更像一场夜晚的旅行。不是为了到达某个地方，而是为了看见一些平时不会注意到的东西。这种感觉会让你在现实中也偶尔产生一种奇妙的体验：好像某些瞬间，世界比表面看起来更深一点。",
            "你的梦境有一种柔软的深度。它不会突然爆发，而是慢慢地展开。像一层层雾气，或者像湖面上逐渐扩散的波纹。有些画面也许会很快消失，但那种感觉会留很久。"
        ];

        // ─────────────────────────────────────────
        //  STATE & CORE LOGIC
        // ─────────────────────────────────────────
        let current = 0, scores = { C: 0, E: 0, X: 0, S: 0 };
        const rnd = arr => arr[Math.floor(Math.random() * arr.length)];
        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

        function startQuiz() {
            current = 0; scores = { C: 0, E: 0, X: 0, S: 0 };
            show('screen-quiz'); renderQ();
        }
        function resetQuiz() { show('screen-intro'); }
        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0, 0);
        }

        function renderQ() {
            const q = questions[current];
            document.getElementById('counter').textContent = `${current + 1} / ${questions.length}`;
            document.getElementById('progress-fill').style.width = `${(current / questions.length) * 100}%`;
            const card = document.getElementById('question-card');
            card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'fadeUp 0.35s ease both';
            document.querySelector('.question-scene').textContent = q.scene || '梦境场景';
            document.getElementById('question-text').textContent = q.q;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
            shuffled.forEach((o, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.dataset.dim = o.d;
                btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${o.t}</span>`;
                btn.onclick = () => pick(o.d, btn);
                grid.appendChild(btn);
            });
        }

        function pick(dim, btn) {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            scores[dim] += 4;
            setTimeout(() => { current++; current < questions.length ? renderQ() : showResult(); }, 380);
        }

        function showResult() {
            // Apply gaussian perturbation (std=3)
            const fs = {};
            for (const d of ['C', 'E', 'X', 'S'])
                fs[d] = clamp(scores[d] + Math.round(gaussianRand(0, 3)), 0, 100);

            const sorted = Object.entries(fs).sort((a, b) => b[1] - a[1]);
            const top1 = sorted[0][0], top2 = sorted[1][0];

            // Title
            let title = null;
            for (const t of titlePool) {
                if ((t.dims[0] === top1 && t.dims[1] === top2) || (t.dims[0] === top2 && t.dims[1] === top1)) { title = t.name; break; }
            }
            if (!title) title = rnd(fallbackTitles);

            // Dream color (new system)
            const dc = scoresToDreamColor(fs);
            const [rr, gg, bb] = hslToRgb(dc.hue, dc.sat, dc.light);
            const orbColor = `rgba(${rr},${gg},${bb},${dc.alpha.toFixed(2)})`;
            const orbColorDim = `rgba(${rr},${gg},${bb},${(dc.alpha * 0.4).toFixed(2)})`;
            const glow = `rgba(${rr},${gg},${bb},0.45)`;
            const colorLabel = buildColorName(dc.hue, top1);

            // Set UI
            document.getElementById('result-title').textContent = `「${title}」`;
            document.getElementById('result-subtitle').textContent = `${dimLabels[top1]} · ${dimLabels[top2]}`;

            const orb = document.getElementById('result-orb');
            orb.style.background = `radial-gradient(circle at 33% 33%, rgba(255,255,255,0.26) 0%, transparent 52%), radial-gradient(circle at 68% 72%, ${orbColor}, ${orbColorDim} 100%)`;
            orb.style.boxShadow = `0 0 80px 28px ${glow}, inset 0 0 40px rgba(255,255,255,0.04)`;

            const dot = document.getElementById('color-dot');
            dot.style.background = orbColor; dot.style.boxShadow = `0 0 10px ${orbColor}`;
            document.getElementById('color-name').textContent = colorLabel;

            // Dim bars
            const dimsDiv = document.getElementById('dims-section');
            dimsDiv.innerHTML = `<div class="section-label" style="text-align:center;margin-bottom:20px;">维度分析</div>`;
            for (const [d, sc] of sorted) {
                const row = document.createElement('div'); row.className = 'dim-row';
                row.innerHTML = `<div class="dim-label">${dimLabels[d]}</div><div class="dim-bar-track"><div class="dim-bar-fill" style="background:${dimColors[d]}" data-s="${sc}"></div></div><div class="dim-score">${sc}</div>`;
                dimsDiv.appendChild(row);
            }

            // Report (personalized)
            const rep = document.getElementById('report-section');
            const o = rnd(openings).replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
            const c = rnd(coreDescs).replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
            const a = rnd(atmospheres);
            const cl = buildPersonalizedClosing(top1, top2, fs).replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
            rep.innerHTML = `
    <div class="report-opening">${o}</div>
    <div class="divider"><span>✦</span></div>
    <div class="report-paragraph">${c}</div>
    <div class="divider"><span>✦</span></div>
    <div class="report-paragraph">${a}</div>
    <div class="divider"><span>✦</span></div>
    <div class="report-paragraph report-italic">${cl}</div>`;

            show('screen-result');
            setTimeout(() => {
                document.querySelectorAll('.dim-bar-fill').forEach(el => el.style.width = el.dataset.s + '%');
                drawRadar(fs);
            }, 320);
        }

        // ─────────────────────────────────────────
        //  RADAR
        // ─────────────────────────────────────────
        function drawRadar(sc) {
            const canvas = document.getElementById('radar');
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height, cx = W / 2, cy = H / 2, R = Math.min(W, H) * 0.36;
            const dims = ['C', 'E', 'X', 'S'], labels = ['掌控', '情绪', '探索', '象征'], n = dims.length;
            ctx.clearRect(0, 0, W, H);
            for (let r = 0.25; r <= 1; r += 0.25) {
                ctx.beginPath();
                for (let i = 0; i < n; i++) {
                    const a = (i / n) * 2 * Math.PI - Math.PI / 2;
                    const x = cx + Math.cos(a) * R * r, y = cy + Math.sin(a) * R * r;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1; ctx.stroke();
            }
            for (let i = 0; i < n; i++) {
                const a = (i / n) * 2 * Math.PI - Math.PI / 2;
                ctx.beginPath(); ctx.moveTo(cx, cy);
                ctx.lineTo(cx + Math.cos(a) * R, cy + Math.sin(a) * R);
                ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1; ctx.stroke();
            }
            ctx.beginPath();
            for (let i = 0; i < n; i++) {
                const a = (i / n) * 2 * Math.PI - Math.PI / 2;
                const v = sc[dims[i]] / 100;
                const x = cx + Math.cos(a) * R * v, y = cy + Math.sin(a) * R * v;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.closePath();
            const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
            g.addColorStop(0, 'rgba(192,132,252,0.32)'); g.addColorStop(1, 'rgba(74,158,255,0.12)');
            ctx.fillStyle = g; ctx.fill();
            ctx.strokeStyle = 'rgba(192,132,252,0.65)'; ctx.lineWidth = 1.5; ctx.stroke();
            const dotC = [dimColors.C, dimColors.E, dimColors.X, dimColors.S];
            for (let i = 0; i < n; i++) {
                const a = (i / n) * 2 * Math.PI - Math.PI / 2;
                const v = sc[dims[i]] / 100;
                const x = cx + Math.cos(a) * R * v, y = cy + Math.sin(a) * R * v;
                ctx.beginPath(); ctx.arc(x, y, 4, 0, 2 * Math.PI);
                ctx.fillStyle = dotC[i]; ctx.fill();
            }
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = '13px "Noto Serif SC",serif';
            for (let i = 0; i < n; i++) {
                const a = (i / n) * 2 * Math.PI - Math.PI / 2;
                const lx = cx + Math.cos(a) * (R + 28), ly = cy + Math.sin(a) * (R + 28);
                ctx.fillStyle = dotC[i]; ctx.fillText(labels[i], lx, ly);
            }
        }
    </script>
</body>
