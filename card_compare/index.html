<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P 极客比大小</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #222;
            color: #0f0;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .box {
            border: 2px solid #0f0;
            padding: 20px;
            margin-top: 20px;
            border-radius: 5px;
        }

        input,
        button {
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px;
            font-family: inherit;
            margin-top: 5px;
        }

        button:hover {
            background: #0f0;
            color: #000;
            cursor: pointer;
        }

        .card {
            font-size: 48px;
            text-align: center;
            margin: 20px 0;
            border: 2px dashed #444;
            padding: 20px;
        }

        #status-log {
            color: #888;
            font-size: 12px;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <h1>> P2P_CARD_BATTLE_</h1>

    <div id="connection-panel" class="box">
        <h3>1. 建立连接</h3>
        <p>我的 ID: <span id="my-id" style="color:yellow">正在获取...</span></p>
        <button onclick="copyId()">复制我的ID</button>
        <hr style="border-color:#444">
        <p>输入对手 ID 进行连接:</p>
        <input type="text" id="opponent-id-input" placeholder="粘贴对方 ID">
        <button onclick="connectToPeer()">连接对手</button>
        <p id="connection-status">状态: 等待连接...</p>
    </div>

    <div id="game-panel" class="box hidden">
        <h3>2. 战场</h3>
        <div style="display: flex; justify-content: space-between;">
            <div style="width: 45%;">
                <p>我 (YOU)</p>
                <div id="my-card" class="card">?</div>
                <button id="draw-btn" onclick="drawCard()" style="width:100%">抽牌 & 出牌</button>
            </div>
            <div style="width: 45%;">
                <p>对手 (OPPONENT)</p>
                <div id="opponent-card" class="card">?</div>
                <div id="opponent-status" style="text-align:center; color:yellow; margin-top:5px;">等待对手...</div>
            </div>
        </div>
        <h2 id="result-display" style="text-align: center; margin-top: 20px; color: white;"></h2>
        <button onclick="resetGame()" style="width: 100%; margin-top: 10px;">再来一局</button>
    </div>

    <div id="status-log"></div>

    <script>
        // --- 初始化 PeerJS ---
        // 这里的配置使用了官方免费的信令服务器。
        // 如果在国内完全连不上，可能需要配置 secure: true 或者更换 host
        const peer = new Peer(null, {
            debug: 2
        });

        let conn = null;
        let myValue = null;
        let opponentValue = null;
        let iAmReady = false;
        let opponentReady = false;

        // 1. 获取自己的 ID
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            log(`已连接到信令服务器，ID: ${id}`);
        });

        // 2. 被动连接（当别人连接我时）
        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
            log("对手已连接！");
        });

        // 3. 主动连接
        function connectToPeer() {
            const remoteId = document.getElementById('opponent-id-input').value;
            if (!remoteId) return alert('请输入对手 ID');
            conn = peer.connect(remoteId);
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('connection-panel').classList.add('hidden');
                document.getElementById('game-panel').classList.remove('hidden');
                log("P2P 通道建立成功！");
            });

            // 监听数据接收
            conn.on('data', (data) => {
                handleData(data);
            });

            conn.on('close', () => alert('对方已断开连接'));
        }

        // --- 游戏逻辑 ---

        function drawCard() {
            if (iAmReady) return; // 防止重复点击

            // 生成 1-100 随机数
            myValue = Math.floor(Math.random() * 100) + 1;
            iAmReady = true;

            document.getElementById('my-card').innerText = myValue;
            document.getElementById('draw-btn').disabled = true;
            document.getElementById('draw-btn').innerText = "已出牌，等待对手";

            // 关键：先发送“状态”，不发送“数值”，防止作弊（简单的防偷窥）
            // 在更复杂的实现中，这里应该发送数值的 Hash
            sendMessage({ type: 'READY_TO_REVEAL' });

            checkReveal();
        }

        function handleData(data) {
            console.log("收到数据:", data);

            if (data.type === 'READY_TO_REVEAL') {
                opponentReady = true;
                document.getElementById('opponent-status').innerText = "对手已出牌！";
                checkReveal();
            } else if (data.type === 'REVEAL_VALUE') {
                opponentValue = data.value;
                document.getElementById('opponent-card').innerText = opponentValue;
                determineWinner();
            } else if (data.type === 'RESET') {
                resetUI();
            }
        }

        // 检查是否双方都准备好亮牌了
        function checkReveal() {
            if (iAmReady && opponentReady) {
                log("双方就绪，交换数据...");
                // 双方都准备好了，现在安全地把真实数字发过去
                sendMessage({ type: 'REVEAL_VALUE', value: myValue });
            }
        }

        function determineWinner() {
            if (myValue === null || opponentValue === null) return;

            const resDiv = document.getElementById('result-display');
            if (myValue > opponentValue) {
                resDiv.innerText = "你赢了！ (WIN)";
                resDiv.style.color = "#0f0";
            } else if (myValue < opponentValue) {
                resDiv.innerText = "你输了... (LOSE)";
                resDiv.style.color = "red";
            } else {
                resDiv.innerText = "平局 (DRAW)";
                resDiv.style.color = "white";
            }
        }

        function resetGame() {
            sendMessage({ type: 'RESET' });
            resetUI();
        }

        function resetUI() {
            myValue = null;
            opponentValue = null;
            iAmReady = false;
            opponentReady = false;
            document.getElementById('my-card').innerText = "?";
            document.getElementById('opponent-card').innerText = "?";
            document.getElementById('draw-btn').disabled = false;
            document.getElementById('draw-btn').innerText = "抽牌 & 出牌";
            document.getElementById('opponent-status').innerText = "等待对手...";
            document.getElementById('result-display').innerText = "";
            log("游戏重置");
        }

        function sendMessage(msg) {
            if (conn && conn.open) {
                conn.send(msg);
            }
        }

        function log(msg) {
            const div = document.getElementById('status-log');
            div.innerText = `> ${msg}\n` + div.innerText;
        }

        function copyId() {
            navigator.clipboard.writeText(document.getElementById('my-id').innerText);
            alert("ID 已复制");
        }
    </script>
</body>

</html>
